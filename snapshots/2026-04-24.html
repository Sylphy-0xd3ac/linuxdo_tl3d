<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linux DO TL3 · 2026-04-24</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #161923;
      --surface2: #1e2231;
      --border: #252b3b;
      --accent: #818cf8;
      --accent-dim: rgba(129,140,248,0.12);
      --text: #dde1ec;
      --muted: #7880a0;
      --tl3: #fbbf24;
      --tl3-dim: rgba(251,191,36,0.1);
      --tl3-border: rgba(251,191,36,0.2);
      --r: 10px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(15,17,23,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.75rem;
    }

    .logo {
      display: flex; align-items: center; gap: 0.55rem;
      font-size: 0.9rem; font-weight: 600; letter-spacing: -0.01em;
    }

    .logo-mark {
      display: flex; align-items: center;
    }

    .header-right {
      font-size: 0.75rem; color: var(--muted);
    }

    /* ── Layout ── */
    .layout {
      flex: 1;
      display: flex;
      max-width: 1080px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem 1.5rem;
      gap: 2.5rem;
      align-items: flex-start;
    }

    /* ── Sidebar ── */
    aside {
      width: 148px; flex-shrink: 0;
      position: sticky; top: 68px;
    }

    .sidebar-label {
      font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); margin-bottom: 0.6rem;
      padding-left: 0.5rem;
    }

    aside a {
      display: block;
      padding: 0.35rem 0.5rem;
      font-size: 0.8rem; color: var(--muted);
      text-decoration: none; border-radius: 6px;
      transition: color 0.12s, background 0.12s;
    }

    aside a:hover { color: var(--text); background: var(--surface2); }

    aside a.active {
      color: var(--accent);
      background: var(--accent-dim);
      font-weight: 500;
    }

    /* ── Main ── */
    main { flex: 1; min-width: 0; }

    .page-header { margin-bottom: 1.5rem; }

    .page-title {
      font-size: 1.6rem; font-weight: 600; letter-spacing: -0.03em;
      display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap;
    }

    .count-tag {
      font-size: 0.8rem; font-weight: 500;
      background: var(--tl3-dim); color: var(--tl3);
      border: 1px solid var(--tl3-border);
      padding: 0.2rem 0.65rem; border-radius: 20px;
    }

    .page-sub {
      margin-top: 0.35rem;
      font-size: 0.82rem; color: var(--muted);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.65rem;
    }

    .user-card {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      text-decoration: none; color: var(--text);
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
    }

    .user-card:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-2px);
    }

    .user-info {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 0.18rem;
    }

    .username {
      font-size: 0.875rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .time { font-size: 0.72rem; color: var(--muted); }

    .badge-pill {
      font-size: 0.68rem; font-weight: 600;
      background: var(--tl3-dim); color: var(--tl3);
      border: 1px solid var(--tl3-border);
      padding: 0.12rem 0.4rem; border-radius: 4px;
      flex-shrink: 0;
    }

    .empty {
      color: var(--muted); font-size: 0.875rem; padding: 3rem 0;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 1.75rem;
      text-align: center;
      font-size: 0.72rem; color: var(--muted);
    }

    footer a { color: var(--muted); text-decoration: underline; text-underline-offset: 2px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      aside { display: none; }
      .layout { padding: 1.25rem 1rem; gap: 0; }
      .grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
      .badge-pill { display: none; }
    }
  </style>
</head>
